<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="50%" stop-color="#16222e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4EF7F5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4EF7F5" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" rx="14" fill="url(#bg)"/>

  <!-- Faint grid -->
  <g stroke="#4EF7F5" stroke-opacity="0.05" stroke-width="1">
    <path d="M0 55 H900"/><path d="M0 110 H900"/><path d="M0 165 H900"/>
    <path d="M150 0 V220"/><path d="M300 0 V220"/><path d="M450 0 V220"/>
    <path d="M600 0 V220"/><path d="M750 0 V220"/>
  </g>

  <!-- ================= NETWORK EDGES ================= -->
  <g stroke="#2a6f6e" stroke-width="1.5" fill="none">
    <path id="e1" d="M80,160 C160,60 240,60 320,110"/>
    <path id="e2" d="M320,110 C400,160 460,170 540,120"/>
    <path id="e3" d="M540,120 C620,70 700,80 820,140"/>
    <path id="e4" d="M80,160 C200,200 420,205 540,120"/>
    <path id="e5" d="M320,110 C440,40 620,35 820,140"/>
  </g>

  <!-- Animated dashed flow on edges -->
  <g stroke="#4EF7F5" stroke-width="1.5" fill="none" stroke-dasharray="6 10" stroke-opacity="0.55">
    <path d="M80,160 C160,60 240,60 320,110">
      <animate attributeName="stroke-dashoffset" from="160" to="0" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M320,110 C400,160 460,170 540,120">
      <animate attributeName="stroke-dashoffset" from="160" to="0" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M540,120 C620,70 700,80 820,140">
      <animate attributeName="stroke-dashoffset" from="160" to="0" dur="4.5s" repeatCount="indefinite"/>
    </path>
    <path d="M80,160 C200,200 420,205 540,120">
      <animate attributeName="stroke-dashoffset" from="192" to="0" dur="6s" repeatCount="indefinite"/>
    </path>
    <path d="M320,110 C440,40 620,35 820,140">
      <animate attributeName="stroke-dashoffset" from="192" to="0" dur="5.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- ================= TRAVELING PULSES ================= -->
  <g>
    <circle r="4" fill="#4EF7F5">
      <animateMotion dur="4s" repeatCount="indefinite" rotate="auto">
        <mpath href="#e1"/>
      </animateMotion>
    </circle>
    <circle r="4" fill="#4EF7F5">
      <animateMotion dur="5s" repeatCount="indefinite" begin="1s">
        <mpath href="#e2"/>
      </animateMotion>
    </circle>
    <circle r="4" fill="#4EF7F5">
      <animateMotion dur="4.5s" repeatCount="indefinite" begin="0.5s">
        <mpath href="#e3"/>
      </animateMotion>
    </circle>
    <circle r="3" fill="#9ffcfb">
      <animateMotion dur="6s" repeatCount="indefinite" begin="2s">
        <mpath href="#e4"/>
      </animateMotion>
    </circle>
    <circle r="3" fill="#9ffcfb">
      <animateMotion dur="5.5s" repeatCount="indefinite" begin="1.5s">
        <mpath href="#e5"/>
      </animateMotion>
    </circle>
  </g>

  <!-- ================= NODES ================= -->
  <g>
    <!-- Node glow halos -->
    <circle cx="80" cy="160" r="18" fill="url(#glow)" opacity="0.5">
      <animate attributeName="r" values="14;22;14" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="110" r="18" fill="url(#glow)" opacity="0.5">
      <animate attributeName="r" values="14;22;14" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="540" cy="120" r="18" fill="url(#glow)" opacity="0.5">
      <animate attributeName="r" values="14;22;14" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="140" r="18" fill="url(#glow)" opacity="0.5">
      <animate attributeName="r" values="14;22;14" dur="4s" repeatCount="indefinite"/>
    </circle>

    <!-- Node cores -->
    <circle cx="80" cy="160" r="7" fill="#0d1117" stroke="#4EF7F5" stroke-width="2.5"/>
    <circle cx="320" cy="110" r="7" fill="#0d1117" stroke="#4EF7F5" stroke-width="2.5"/>
    <circle cx="540" cy="120" r="7" fill="#0d1117" stroke="#4EF7F5" stroke-width="2.5"/>
    <circle cx="820" cy="140" r="7" fill="#0d1117" stroke="#4EF7F5" stroke-width="2.5"/>
  </g>

  <!-- Node labels -->
  <g font-family="Consolas, 'Fira Code', monospace" font-size="12" fill="#7fdedd" text-anchor="middle">
    <text x="80" y="188">design</text>
    <text x="320" y="90">build</text>
    <text x="540" y="150">optimize</text>
    <text x="820" y="170">ship</text>
  </g>

  <!-- Title -->
  <g font-family="Consolas, 'Fira Code', monospace" text-anchor="middle">
    <text x="450" y="38" font-size="20" font-weight="bold" fill="#4EF7F5" letter-spacing="3">
      FINDING THE OPTIMAL PATH
      <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="450" y="58" font-size="11" fill="#5a8f8e" letter-spacing="2">
      min Σ cᵢⱼ·xᵢⱼ  —  subject to: curiosity ≥ 1
    </text>
  </g>
</svg>
